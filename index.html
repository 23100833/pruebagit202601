<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        input.error {
            border-color: #e74c3c;
        }

        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-group input.error + .error-message {
            display: block;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .success-message {
            background: #2ecc71;
            color: white;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        .footer-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 25px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Bienvenido</h1>
            <p>Inicia sesión con tus credenciales</p>
        </div>

        <div class="success-message" id="successMessage">
            ¡Sesión iniciada correctamente!
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="ejemplo@correo.com"
                    required
                >
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Ingresa tu contraseña"
                    required
                >
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="submit-btn">Iniciar Sesión</button>
        </form>

        <p class="footer-text">¿No tienes cuenta? <a href="#" style="color: #667eea; text-decoration: none;">Regístrate aquí</a></p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const successMessage = document.getElementById('successMessage');

        // Validar email
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Limpiar mensajes de error
        function clearErrors() {
            emailError.textContent = '';
            passwordError.textContent = '';
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');
            successMessage.classList.remove('show');
        }

        // Validar formulario
        function validateForm() {
            clearErrors();
            let isValid = true;

            // Validar email
            if (emailInput.value.trim() === '') {
                emailError.textContent = 'El correo electrónico es requerido';
                emailInput.classList.add('error');
                isValid = false;
            } else if (!isValidEmail(emailInput.value)) {
                emailError.textContent = 'Por favor, ingresa un correo válido';
                emailInput.classList.add('error');
                isValid = false;
            }

            // Validar contraseña
            if (passwordInput.value === '') {
                passwordError.textContent = 'La contraseña es requerida';
                passwordInput.classList.add('error');
                isValid = false;
            } else if (passwordInput.value.length < 6) {
                passwordError.textContent = 'La contraseña debe tener al menos 6 caracteres';
                passwordInput.classList.add('error');
                isValid = false;
            }

            return isValid;
        }

        // Manejar envío del formulario
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            if (validateForm()) {
                // Mostrar mensaje de éxito
                successMessage.classList.add('show');

                // Simular envío (aquí iría tu lógica de backend)
                console.log('Datos de login:', {
                    email: emailInput.value,
                    password: passwordInput.value
                });

                // Limpiar formulario después de 2 segundos
                setTimeout(() => {
                    loginForm.reset();
                    successMessage.classList.remove('show');
                }, 2000);
            }
        });

        // Limpiar errores cuando el usuario comienza a escribir
        emailInput.addEventListener('input', function() {
            if (this.classList.contains('error')) {
                this.classList.remove('error');
                emailError.textContent = '';
            }
        });

        passwordInput.addEventListener('input', function() {
            if (this.classList.contains('error')) {
                this.classList.remove('error');
                passwordError.textContent = '';
            }
        });
    </script>
</body>
</html>
